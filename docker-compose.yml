services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: memaxx
      POSTGRES_USER: memaxx
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-memaxx}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memaxx -d memaxx"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  memaxx:
    build: .
    ports:
      - "${PORT:-3100}:3100"
    environment:
      # Database
      - DATABASE_URL=postgresql://memaxx:${POSTGRES_PASSWORD:-memaxx}@postgres:5432/memaxx

      # Embedding provider (configured via dashboard onboarding)
      - EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER:-}
      - EMBEDDING_API_KEY=${EMBEDDING_API_KEY:-}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-}
      - EMBEDDING_BASE_URL=${EMBEDDING_BASE_URL:-}

      # LLM for entity extraction (optional)
      - LLM_PROVIDER=${LLM_PROVIDER:-}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o-mini}
      - LLM_BASE_URL=${LLM_BASE_URL:-}

      # Server
      - PORT=3100
      - HOST=0.0.0.0
      - AUTH_TOKEN=${AUTH_TOKEN:-}

      # Backup configuration
      - BACKUP_DIR=/app/.memaxx-backups
      - BACKUP_KEEP_DAYS=${BACKUP_KEEP_DAYS:-14}
    volumes:
      # Persist daily JSON backups across container rebuilds
      - backups:/app/.memaxx-backups
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3100/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  pgdata:
  backups:
