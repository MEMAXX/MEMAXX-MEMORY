<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>MEMAXX Remote</title><style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#e5e5e5;font-family:-apple-system,system-ui,sans-serif;height:100dvh;display:flex;flex-direction:column;overflow:hidden;touch-action:none}

#dialog .ws-list{display:flex;flex-direction:column;gap:4px;margin-bottom:16px;max-height:200px;overflow-y:auto}
#dialog .ws-list button{display:flex;align-items:center;gap:8px;padding:10px 12px;border:1px solid #222;border-radius:8px;background:#0a0a0a;color:#aaa;font:400 12px/1 -apple-system,system-ui,sans-serif;cursor:pointer;text-align:left;transition:border-color .1s,color .1s}

#tabs button{position:relative;display:flex;align-items:center;justify-content:center;gap:6px;padding:6px 12px;border:none;background:transparent;color:#666;font:500 11px/1 -apple-system,system-ui,sans-serif;cursor:pointer;white-space:nowrap;border-right:1px solid #222;transition:color .1s,background .1s;flex:1;overflow:hidden;text-overflow:ellipsis}
#tabs button:hover{background:#1a1a1a;color:#aaa}

.spin{width:24px;height:24px;border:2px solid #333;border-top-color:#A78BFA;border-radius:50%;animation:s .6s linear infinite}

#keys{display:none;align-items:center;gap:1px;border-top:1px solid #222;background:#111;padding:4px 8px;flex-shrink:0}
#keys button{display:flex;align-items:center;justify-content:center;height:36px;min-width:36px;padding:0 10px;border:none;border-radius:6px;background:#1a1a1a;color:#aaa;font:600 12px/1 monospace;cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:transparent;transition:background .1s,color .1s}

@media(max-width:768px){#keys{display:flex}#ibar{display:flex}}
</style></head><body>
<div id="bar"><div class="st"><span class="dot off" id="dot"></span><span id="st">Connecting...</span><span class="latency" id="lat"></span></div><span class="sp"></span><div class="ctrl"><button id="btn-ws" title="Switch workspace" style="display:none">&#x21C5; <span id="ws-name"></span></button><div class="sep" id="ws-sep" style="display:none"></div><button id="btn-new" title="New terminal">&#x2b; New</button><div class="sep"></div><button id="btn-close" class="danger" title="Close terminal">&#x2715; Close</button></div></div>
<div id="dialog"><div class="card" id="dialog-content"></div></div>
<div id="tabs"></div>
<div id="wrap"><canvas id="cv"></canvas><div id="ov"><div class="spin"></div>Connecting to terminal...</div></div>
<div id="keys">
<button id="k-up" style="font-size:16px">&#x2191;</button><button id="k-dn" style="font-size:16px">&#x2193;</button><button id="k-lt" style="font-size:16px">&#x2190;</button><button id="k-rt" style="font-size:16px">&#x2192;</button>
<div class="sep"></div>
<button id="k-spc">SPC</button><button id="k-tab">TAB</button><button id="k-esc">ESC</button><button id="k-cc" style="color:#ef4444">^C</button>
<div class="sep"></div>
<button id="k-bs" style="font-size:15px">&#x2190;</button>
<div style="flex:1"></div>
<button class="ent" id="k-ret">&#x23CE;</button>
</div>
<div id="ibar"><input id="cmd" type="text" placeholder="$ command..." autocapitalize="off" autocorrect="off" spellcheck="false"></div>
<script>
// ── Multi-Pane Grid Renderer ──
const DPR = window.devicePixelRatio || 1;
const FONT_SIZE = window.innerWidth < 640 ? 10 : 13;
const FONT = '"SF Mono","Cascadia Code","JetBrains Mono","Fira Code",monospace';
const LINE_H = 1.5;
const DEF_FG = [228,228,228], DEF_BG = [0,0,0], CURSOR_CLR = [255,255,255];
const BOLD=1,DIM=2,ITALIC=4,UNDERLINE=8,INVERSE=32,INVISIBLE=64,STRIKE=128,WIDE_SPACER=512;

let cv, ctx, cellW, cellH;
const rgbCache = new Map();

// Per-pane state: { grid, cols, rows, curX, curY, curVis, dirty }
const paneStates = new Map();
let paneList = []; // PaneMetadata[] from terminal:meta
let activePty = null;
let workspaceList = []; // WorkspaceInfo[] from terminal:meta
let activeWsId = null;

function rgb(r,g,b){ const k=(r<<16)|(g<<8)|b; let c=rgbCache.get(k); if(!c){c='rgb('+r+','+g+','+b+')';rgbCache.set(k,c);} return c; }

function measure(){
  const sz = FONT_SIZE*DPR;
  const oc = new OffscreenCanvas(200,200); const ox = oc.getContext('2d');
  ox.font = sz+'px '+FONT;
  const m = ox.measureText('M');
  cellW = Math.ceil(m.width);
  cellH = Math.ceil(sz*LINE_H);
}

function getPane(ptyId) {
  let s = paneStates.get(ptyId);
  if (!s) { s = { grid:[], cols:0, rows:0, curX:0, curY:0, curVis:true, dirty:new Set(), scrollback:[], sbOffset:0 }; paneStates.set(ptyId, s); }
  return s;
}

function setGrid(ptyId, cells, c, r) {
  const s = getPane(ptyId);
  s.grid = cells; s.cols = c; s.rows = r;
  s.dirty.clear(); for(let i=0;i<r;i++) s.dirty.add(i);
}

function updateRows(ptyId, dirtyRows) {
  const s = getPane(ptyId);
  for (const dr of dirtyRows) {
    const y = dr.row !== undefined ? dr.row : dr.y;
    const cells = dr.cells;
    if (y < s.grid.length) s.grid[y] = cells;
    else { while(s.grid.length<=y) s.grid.push(Array.from({length:s.cols},()=>({c:' '}))); s.grid[y]=cells; }
    s.dirty.add(y);
  }
}

function setCursor(ptyId, x, y, v) {
  const s = getPane(ptyId);
  if(s.curY>=0&&s.curY<s.rows) s.dirty.add(s.curY);
  if(y>=0&&y<s.rows) s.dirty.add(y);
  s.curX=x; s.curY=y; s.curVis=v;
}

function appendScrollback(ptyId, lines) {
  const s = getPane(ptyId);
  for (const line of lines) s.scrollback.push(line);
  // Cap at 10000 lines
  if (s.scrollback.length > 10000) s.scrollback = s.scrollback.slice(s.scrollback.length - 10000);
}

function scrollViewport(delta) {
  if (!activePty) return;
  const s = paneStates.get(activePty);
  if (!s) return;
  const maxOffset = s.scrollback.length;
  const newOffset = Math.max(0, Math.min(s.sbOffset - delta, maxOffset));
  if (newOffset !== s.sbOffset) {
    s.sbOffset = newOffset;
    markAllDirty(s);
  }
}

function markAllDirty(s) {
  s.dirty.clear();
  for (var i = 0; i < Math.max(s.rows, viewRows); i++) s.dirty.add(i);
}

function render() {
  if (!ctx || !activePty) return;
  const s = paneStates.get(activePty);
  if (!s || s.dirty.size === 0) return;

  const sz = FONT_SIZE*DPR;
  const tyOff = (cellH-sz)/2;
  ctx.textBaseline = 'top';

  var renderCols = s.cols; // full width — horizontal scroll handles overflow
  var renderRows = Math.min(s.rows, viewRows);
  var sbLen = s.scrollback.length;
  // When grid is taller than viewport, offset to show the bottom (where cursor is)
  var gridSkip = Math.max(0, s.rows - viewRows);
  var showCursor = s.sbOffset === 0;
  for (const screenRow of s.dirty) {
    if (screenRow<0 || screenRow>=renderRows) continue;
    // Viewport: scrollback lines above, then grid lines (offset to bottom)
    var bufIdx = sbLen - s.sbOffset + screenRow;
    var line;
    if (bufIdx < sbLen) { line = s.scrollback[bufIdx] || null; }
    else { var gridRow = bufIdx - sbLen + gridSkip; line = gridRow < s.grid.length ? s.grid[gridRow] : null; }
    const y = screenRow*cellH;
    ctx.fillStyle = rgb(DEF_BG[0],DEF_BG[1],DEF_BG[2]);
    ctx.fillRect(0, y, cv.width, cellH);
    if (!line) continue;

    const batches = [[],[],[],[]];
    for (let col=0; col<line.length && col<renderCols; col++) {
      const cell = line[col]; const fl = cell.flags||0;
      if (fl&WIDE_SPACER) continue;
      const x = col*cellW;
      let fg = cell.fg||DEF_FG, bg = cell.bg||null;
      if (fl&INVERSE) { const t=fg; fg=bg||DEF_BG; bg=t; }
      const isGridRow = bufIdx >= sbLen;
      const gridRow2 = bufIdx - sbLen + gridSkip;
      const isCur = showCursor && s.curVis && isGridRow && gridRow2===s.curY && col===s.curX;
      if (isCur) { bg=CURSOR_CLR; fg=DEF_BG; }
      if (bg) { ctx.fillStyle=rgb(bg[0],bg[1],bg[2]); ctx.fillRect(x,y,cellW,cellH); }
      const ch = cell.c;
      if (ch && ch!==' ' && !(fl&INVISIBLE)) {
        const dim = fl&DIM ? 0.6 : 1;
        const color = rgb(Math.round(fg[0]*dim),Math.round(fg[1]*dim),Math.round(fg[2]*dim));
        const bi = (fl&BOLD?1:0)|(fl&ITALIC?2:0);
        batches[bi].push({x, y:y+tyOff, c:ch, color});
      }
      if (fl&UNDERLINE) { ctx.fillStyle=rgb(fg[0],fg[1],fg[2]); ctx.fillRect(x,y+cellH-1,cellW,1); }
      if (fl&STRIKE) { ctx.fillStyle=rgb(fg[0],fg[1],fg[2]); ctx.fillRect(x,y+(cellH>>1),cellW,1); }
    }
    const fonts = [sz+'px '+FONT, 'bold '+sz+'px '+FONT, 'italic '+sz+'px '+FONT, 'italic bold '+sz+'px '+FONT];
    for (let i=0;i<4;i++) {
      if (!batches[i].length) continue;
      ctx.font = fonts[i];
      for (const cmd of batches[i]) { ctx.fillStyle=cmd.color; ctx.fillText(cmd.c,cmd.x,cmd.y); }
    }
  }
  s.dirty.clear();
}

// ── Tab Bar ──
function renderTabs() {
  const tabsEl = document.getElementById('tabs');
  tabsEl.style.display = 'flex';
  tabsEl.innerHTML = '';
  paneList.forEach(function(pane, i) {
    const btn = document.createElement('button');
    const isActive = pane.pty_id === activePty;
    if (isActive) btn.className = 'active';
    // Title: AI CLI name takes priority, then cwd folder, then shell, then generic
    var title = pane.paneTitle || pane.cwd.split('/').filter(Boolean).pop() || pane.shellName || ('Terminal '+(i+1));
    btn.innerHTML = '<span class="tdot '+(pane.isAlive?'alive':'dead')+'"></span><span style="overflow:hidden;text-overflow:ellipsis">' + escHtml(title) + '</span>';
    btn.onclick = function() { switchPane(pane.pty_id); };
    tabsEl.appendChild(btn);
  });
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderWorkspaceButton() {
  var btn = document.getElementById('btn-ws');
  var sep = document.getElementById('ws-sep');
  if (workspaceList.length <= 1) { btn.style.display='none'; sep.style.display='none'; return; }
  btn.style.display='flex'; sep.style.display='block';
  var active = workspaceList.find(function(w){return w.id===activeWsId;});
  document.getElementById('ws-name').textContent = active ? (active.name || active.rootDir.split('/').pop()) : 'Workspace';
}

function showWorkspaceDialog() {
  var dc = document.getElementById('dialog-content');
  var html = '<h3>Switch Workspace</h3><div class="ws-list">';
  workspaceList.forEach(function(ws) {
    var name = ws.name || ws.rootDir.split('/').pop() || 'Workspace';
    var cls = ws.id === activeWsId ? 'active' : '';
    html += '<button class="'+cls+'" onclick="switchWorkspace(\''+ws.id+'\')">'+escHtml(name)+'<span style="margin-left:auto;font-size:10px;color:#555">'+escHtml(ws.rootDir)+'</span></button>';
  });
  html += '</div><div class="btns"><button class="cancel" onclick="closeDialog()">Cancel</button></div>';
  dc.innerHTML = html;
  document.getElementById('dialog').className='open';
}

function switchWorkspace(wsId) {
  closeDialog();
  send({event:'workspace:switch', workspace_id: wsId});
  activeWsId = wsId;
  renderWorkspaceButton();
}

function switchPane(ptyId) {
  activePty = ptyId;
  renderTabs();
  // Repaint active pane
  const s = paneStates.get(ptyId);
  if (s) { s.dirty.clear(); for(let i=0;i<s.rows;i++) s.dirty.add(i); sizeCanvas(); }
  send({event:'terminal:request_snapshot', pty_id: ptyId});
}

// ── WebSocket ──
const wsProto = location.protocol==='https:'?'wss:':'ws:';
const wsUrl = wsProto+'//'+location.host+'/remote/ws?role=viewer';
let ws=null, mode='readonly', reconnTimer=null;

function connect(){
  ws = new WebSocket(wsUrl);
  ws.onopen = function() { if(reconnTimer){clearTimeout(reconnTimer);reconnTimer=null;} };
  ws.onmessage = function(e) { try{handle(JSON.parse(e.data));}catch(err){console.error('[remote] parse error:',err);} };
  ws.onclose = function() { setStatus(false,'Disconnected'); reconnTimer=setTimeout(connect,3000); };
  ws.onerror = function() {};
}

function send(obj){ if(ws&&ws.readyState===1) ws.send(JSON.stringify(obj)); }
function sendKey(k){ if(mode==='interactive' && activePty) send({event:'terminal:write', pty_id:activePty, payload:{data:k}}); }

// Viewer is read-only for PTY dimensions — never sends terminal:resize
function handle(msg){
  var ev = msg.event;
  if(ev==='session:info'){
    if(msg.active){ initCanvas(); setStatus(true,'Connected'); setMode(msg.mode); send({event:'terminal:request_meta'}); }
    else setStatus(false,'No active session');
  } else if(ev==='session:start'){
    initCanvas(); setStatus(true,'Connected'); setMode(msg.mode); send({event:'terminal:request_meta'});
  } else if(ev==='session:end'){
    setStatus(false,'Session ended');
  } else if(ev==='mode:change'){
    setMode(msg.mode);
  } else if(ev==='terminal:snapshot'){
    initCanvas();
    var ptyId = msg.pty_id;
    var p = msg.payload;
    if (ptyId && p.cells) {
      setGrid(ptyId, p.cells, p.cols, p.rows);
      if (p.cursorX !== undefined) setCursor(ptyId, p.cursorX, p.cursorY, p.cursorVisible !== false);
      // Auto-select first pane
      if (!activePty) { activePty = ptyId; renderTabs(); }
    }
    document.getElementById('ov').style.display='none';
    // Resize producer PTY to match viewer — only once per pane to avoid loop
  } else if(ev==='terminal:update'){
    var ptyId2 = msg.pty_id;
    var p2 = msg.payload;
    if (ptyId2) {
      if(p2.t==='d' && p2.rows) updateRows(ptyId2, p2.rows);
      else if(p2.t==='c') setCursor(ptyId2, p2.x, p2.y, p2.v);
      else if(p2.t==='sb' && p2.lines) appendScrollback(ptyId2, p2.lines);
    }
  } else if(ev==='terminal:meta'){
    if(msg.payload){
      if (msg.payload.panes) {
        var newPanes = msg.payload.panes;
        var newIds = new Set(newPanes.map(function(p){return p.pty_id;}));
        // Clear stale pane states from previous workspace
        for (var oldId of paneStates.keys()) {
          if (!newIds.has(oldId)) paneStates.delete(oldId);
        }
        paneList = newPanes;
        // Reset activePty if it's not in the new pane list
        if (!activePty || !newIds.has(activePty)) {
          activePty = paneList.length > 0 ? paneList[0].pty_id : null;
        }
        paneList.forEach(function(pane){ send({event:'terminal:request_snapshot', pty_id: pane.pty_id}); });
        renderTabs();
      }
      if (msg.payload.workspaces) {
        workspaceList = msg.payload.workspaces;
        activeWsId = msg.payload.activeWorkspaceId || null;
        renderWorkspaceButton();
      }
    }
  } else if(ev==='terminal:pong'){
    if(msg.ts) setLatency(Date.now()-msg.ts);
  }
}

function setStatus(on,txt){ document.getElementById('dot').className='dot '+(on?'on':'off'); document.getElementById('st').textContent=txt; }
function setMode(m){ mode=m; }
function setLatency(ms){ document.getElementById('lat').textContent=ms+'ms'; }

// ── Control buttons ──
document.getElementById('btn-ws').onclick=function(){ showWorkspaceDialog(); };
document.getElementById('btn-new').onclick=function(){
  if(!activePty) return;
  send({event:'pane:split', pty_id:activePty, payload:{direction:'horizontal'}});
};
document.getElementById('btn-close').onclick=function(){
  if(!activePty) return;
  var dc=document.getElementById('dialog-content');
  dc.innerHTML='<h3>Close terminal?</h3><p>This will close the active terminal and terminate any running processes.</p><div class="btns"><button class="cancel" onclick="closeDialog()">Cancel</button><button class="confirm" onclick="confirmClose()">Close</button></div>';
  document.getElementById('dialog').className='open';
};
function closeDialog(){ document.getElementById('dialog').className=''; }
function confirmClose(){
  closeDialog();
  if(activePty) send({event:'pane:close', pty_id:activePty, payload:{}});
}

// Latency ping every 5s
setInterval(function(){
  if(ws&&ws.readyState===1){
    var t=Date.now();
    send({event:'terminal:ping', payload:{ts:t}});
  }
},5000);

// ── Canvas init ──
var inited=false;
function initCanvas(){
  if(inited) return; inited=true;
  measure();
  cv=document.getElementById('cv');
  ctx=cv.getContext('2d',{alpha:false});
  if(/Mac|iPhone|iPad/.test(navigator.platform)) ctx.textRendering='geometricPrecision';
  var resizeTimer=null;
  new ResizeObserver(function(){ if(resizeTimer)clearTimeout(resizeTimer); resizeTimer=setTimeout(sizeCanvas,150); }).observe(document.getElementById('wrap'));
  sizeCanvas();
  (function loop(){ render(); requestAnimationFrame(loop); })();
}

var viewCols=80, viewRows=24;
function sizeCanvas(){
  if(!cv||!cellW) return;
  var wrap=document.getElementById('wrap');
  var rect=wrap.getBoundingClientRect();
  var c=Math.floor(rect.width*DPR/cellW);
  var r=Math.floor(rect.height*DPR/cellH);
  if(c>0&&r>0){
    viewCols=c; viewRows=r;
    // Canvas width = max of viewport and grid (enables horizontal scroll)
    var s = activePty ? paneStates.get(activePty) : null;
    var gridCols = s ? s.cols : c;
    var canvasCols = Math.max(c, gridCols);
    cv.width=canvasCols*cellW; cv.height=r*cellH;
    cv.style.width=cv.width/DPR+'px'; cv.style.height=cv.height/DPR+'px';
    // Mark active pane fully dirty for repaint
    if (activePty) { var s=paneStates.get(activePty); if(s){s.dirty.clear();for(var i=0;i<Math.max(s.rows,r);i++)s.dirty.add(i);} }
  }
}

// ── Key buttons (real escape sequences) ──
var keyMap = {
  'k-up':'\x1b[A', 'k-dn':'\x1b[B', 'k-lt':'\x1b[D', 'k-rt':'\x1b[C',
  'k-spc':' ', 'k-tab':'\t', 'k-esc':'\x1b', 'k-cc':'\x03', 'k-bs':'\x7f', 'k-ret':'\r'
};
Object.keys(keyMap).forEach(function(id){
  var el = document.getElementById(id);
  if(el) el.addEventListener('pointerdown',function(e){ e.preventDefault(); sendKey(keyMap[id]); });
});

// ── Command input ──
var cmdInput=document.getElementById('cmd');
cmdInput.addEventListener('keydown',function(e){
  if(e.key==='Enter'){
    e.preventDefault();
    var v=cmdInput.value;
    if(v&&mode==='interactive'&&activePty){send({event:'terminal:write',pty_id:activePty,payload:{data:v}});send({event:'terminal:write',pty_id:activePty,payload:{data:'\r'}});cmdInput.value='';}
  }
});
cmdInput.addEventListener('focus',function(){requestAnimationFrame(function(){window.scrollTo(0,0);});});

// ── Desktop keyboard ──
document.getElementById('wrap').tabIndex=0;
document.getElementById('wrap').addEventListener('keydown',function(e){
  if(mode!=='interactive'||!activePty) return;
  if(e.target.tagName==='INPUT') return;
  e.preventDefault();
  var d='';
  if(e.ctrlKey&&!e.altKey&&!e.metaKey){var c=e.key.toUpperCase().charCodeAt(0);if(c>=65&&c<=90)d=String.fromCharCode(c-64);}
  else if(e.key==='Enter')d='\r';else if(e.key==='Backspace')d='\x7f';else if(e.key==='Tab')d='\t';
  else if(e.key==='Escape')d='\x1b';else if(e.key==='ArrowUp')d='\x1b[A';else if(e.key==='ArrowDown')d='\x1b[B';
  else if(e.key==='ArrowRight')d='\x1b[C';else if(e.key==='ArrowLeft')d='\x1b[D';
  else if(e.key==='Home')d='\x1b[H';else if(e.key==='End')d='\x1b[F';
  else if(e.key==='Delete')d='\x1b[3~';else if(e.key.length===1&&!e.ctrlKey&&!e.metaKey)d=e.key;
  if(d) send({event:'terminal:write',pty_id:activePty,payload:{data:d}});
});

// ── Paste ──
document.getElementById('wrap').addEventListener('paste',function(e){
  if(mode!=='interactive'||!activePty)return;e.preventDefault();
  var t=e.clipboardData.getData('text');
  if(t) send({event:'terminal:write',pty_id:activePty,payload:{data:'\x1b[200~'+t+'\x1b[201~'}});
});

// ── Mouse wheel scroll ──
document.getElementById('wrap').addEventListener('wheel',function(e){
  e.preventDefault();
  var delta = e.deltaY > 0 ? -3 : 3;
  scrollViewport(delta);
},{passive:false});

// ── Touch scroll (inverted, like old cloud dashboard) ──
var touchY=null, touchAcc=0;
document.getElementById('wrap').addEventListener('touchstart',function(e){
  if(e.touches.length===1){touchY=e.touches[0].clientY;touchAcc=0;}
},{passive:true});
document.getElementById('wrap').addEventListener('touchmove',function(e){
  if(touchY===null||!cellH) return;
  var dy = e.touches[0].clientY - touchY;
  touchY = e.touches[0].clientY;
  touchAcc += dy;
  var rowPx = cellH / DPR;
  var lines = Math.trunc(touchAcc / rowPx);
  if(lines!==0){ touchAcc -= lines * rowPx; scrollViewport(-lines); }
},{passive:true});
document.getElementById('wrap').addEventListener('touchend',function(){touchY=null;touchAcc=0;},{passive:true});

connect();
</script></body></html>
